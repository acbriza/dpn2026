  continuous_features: ["AGE", "CMAP-ANK", "CMAP-ANK.1", "CMAP-KNE", "CMAP-KNE.1", "DL", "DL.1",
                        "DM DUR", "F WAVE", "F WAVE.1", "FEET %ASSYM", "FEET MEAN ESC",
                        "HANDS %ASSYM", "HANDS MEAN ESC", "HBA1C", "MCV", "MCV.1", "MNSI", "Uv",
                        "Uv.1", "Uv.2", "Uv.3", "m/s", "m/s.1", "m/s.2", "m/s.3"]

cf_params_2:
  features_to_vary: []
  continuous_features: []

model_1:
  type: "logisticat"
  backend: "sklearn"

model_2:
  type: "randomforest"
  backend: "sklearn"