dataset:
  path: "data/your_data.csv"
  feature_set_1: ["SEX", "AGE", "DM DUR", "INSULIN", "HBA1C", "HPN", "PAOD", "DSLPDMIA", "CKD", "GBS", "DEC VS", "DEC PPS", "DEC LTS", "DEC AR", "MNSI", "Uv", "m/s", "Uv.1", "m/s.1", "MCV", "DL", "CMAP-ANK", "CMAP-KNE", "F WAVE", "Uv.2", "m/s.2", "Uv.3", "m/s.3", "MCV.1", "DL.1", "CMAP-ANK.1", "CMAP-KNE.1", "F WAVE.1", "FEET MEAN ESC", "FEET %ASSYM" ,"HANDS MEAN ESC", "HANDS %ASSYM"]
  feature_set_2: []
  target: "DPN_Status"

cf_params_1:
