experiment:
  summary: binary classification - hyperparameter optimization (development)
  classification_type: binary
  stage: hyperparameter_optimization
  tag: development
  verbosity: 1
  random_seed: 42

data:
  dataset_path: ../dataset/Sudoscan Working File with Stats.xlsx

model: 
  name: catboost
  code: CatBoost

param_space:
  iterations:
    min: 100
    max: 500 
  depth:
    min: 4
    max: 10
  learning_rate:
    min: 0.01
    max: 0.1
  l2_leaf_reg:
    min: 1
    max: 9

optimization:
  k_splits_outer: 3
  n_repeats_outer: 2
  k_splits_inner: 3
  n_iter: 5
  optimization_metric: auprc #options implemented: roc-auc or auprc
  threshold_selection_metric: f2 # options implemented: f2, roc-auc

evaluation:
  confidence: 0.95

final_training:
  k_splits_inner: 3
  n_iter: 5